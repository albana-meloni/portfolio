    <div class="container text-center my-5"><h4>Completa los campos para enviar el mensaje.</h4></div>

    <form class="form row g-3 pt-4 px-4" action="https://formspree.io/f/mzboabvv" method="POST">
        <div class="form-floating mb-3">
            <input type="text" name="nombre" class="form-control" id="floatingName" placeholder="Nombre Apellido" required>
            <label for="floatingName">Nombre completo <span>*</span></label>
        </div>
        <div class="col-sm-8 form-floating mb-3">
            <input type="email" name="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
            <label for="floatingInput">Email <span>*</span></label>
        </div>
        <div class="col-sm-4 form-floating mb-3">
            <input type="tel" name="telefono" class="form-control" id="floatingTel" placeholder="(11) 1234-5678">
            <label for="floatingTel">Teléfono</label>
        </div>
        <div class="form-floating mb-3">
            <textarea class="form-control" placeholder="Deja el mensaje aquí" id="floatingTextarea" required></textarea>
            <label for="floatingTextarea">Mensaje <span>*</span></label>
        </div>

        <div class="container d-flex justify-content-between my-3">
            <input type="reset" value="Borrar todo" class="btn btn-outline-dark">
            <input type="submit" value="Enviar" class="btn btn-outline-primary">
        </div>
    </form>
